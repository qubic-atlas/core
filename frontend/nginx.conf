# Qubic Atlas — nginx config for the production container.
# Serves the built SPA from /usr/share/nginx/html and proxies /api/ to the backend.
# The backend host:port is templated from the $ATLAS_UPSTREAM env var (see Dockerfile);
# default is annexplorer's Node/C# server on :8099.

server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Docker's embedded DNS. Required so the /api proxy re-resolves the backend at request
    # time (see the /api/ location) instead of caching one IP at startup — otherwise, if the
    # api container restarts and gets a new IP, nginx keeps proxying to the dead one and every
    # /api call 502s until nginx is reloaded. valid=10s bounds how long a resolution is cached.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # gzip the static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # long-cache fingerprinted build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy → backend. ATLAS_UPSTREAM is substituted at container start into $atlas_upstream;
    # using a *variable* in proxy_pass forces nginx to resolve it per-request via the resolver
    # above (a bare hostname would be resolved just once at startup). $request_uri preserves the
    # full path + query string since the backend serves the same /api/ prefix.
    location /api/ {
        set $atlas_upstream ${ATLAS_UPSTREAM};
        proxy_pass http://$atlas_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # HyperIdentity verify can take a few seconds
    }

    # SPA fallback — every non-file route serves index.html so the Vue router handles it
    location / {
        try_files $uri $uri/ /index.html;
    }
}
